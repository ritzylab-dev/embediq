name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate message catalogs (messages.iq → C headers)
        run: |
          python3 tools/messages_iq/generate.py messages/core.iq \
              --out generated/ --output-name embediq_msg_catalog.h
          python3 tools/messages_iq/generate.py messages/thermostat.iq \
              --out generated/ --output-name thermostat_msg_catalog.h

      - name: Verify generated headers match .iq source (drift check)
        run: |
          mkdir -p /tmp/iq_fresh
          python3 tools/messages_iq/generate.py messages/core.iq \
              --out /tmp/iq_fresh/ --output-name embediq_msg_catalog.h
          python3 tools/messages_iq/generate.py messages/thermostat.iq \
              --out /tmp/iq_fresh/ --output-name thermostat_msg_catalog.h
          diff generated/embediq_msg_catalog.h /tmp/iq_fresh/embediq_msg_catalog.h
          diff generated/thermostat_msg_catalog.h /tmp/iq_fresh/thermostat_msg_catalog.h

      - name: Build (host platform)
        run: |
          cmake -B build -DEMBEDIQ_PLATFORM=host
          cmake --build build

      - name: Validate — no hardcoded sizing constants (Invariant I-08)
        run: python3 tools/validator.py

      - name: Compat — v1 API surface (Invariant I-14, only if file exists)
        run: |
          if [ -f tests/compat/fb_v1_compat.c ]; then
            gcc -I core/include -I generated -std=c11 -Wall -Werror \
              -DEMBEDIQ_MSG_MAX_PAYLOAD=64 \
              -c tests/compat/fb_v1_compat.c
          fi

      - name: Library Observatory obligation check — strict (R-lib-1)
        run: python3 tools/ci/check_lib_obs.py --strict

      - name: Component OSAL handle storage check — warning (R-lib-4)
        run: python3 tools/ci/component_globals_check.py

      - name: Component OSAL API call check — warning (R-lib-4)
        run: python3 tools/ci/component_state_check.py

      - name: Vendoring manifest completeness check — warning (R-lib-3)
        run: python3 tools/ci/vendoring_check.py

      - name: Vendoring anomaly date staleness check — warning (R-lib-3)
        run: python3 tools/ci/vendoring_date_check.py

      - name: Ops table ABI version field check — warning (R-lib-4, D-LIB-5)
        run: python3 tools/ci/ops_version_check.py

      - name: SPDX licence identifier check — warning
        run: python3 tools/ci/licence_check.py

      - name: Binary blob detection — warning
        run: python3 tools/ci/binary_blob_check.py
